<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Essay Checker</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        input, button { padding: 10px; margin-top: 5px; }

        /* Updated pre style to wrap JSON properly */
        pre {
            background: #f4f4f4;
            padding: 10px;
            white-space: pre-wrap;       /* Wrap long lines */
            word-wrap: break-word;       /* Break long words if needed */
            max-width: 100%;             /* Never exceed container width */
            overflow-x: auto;            /* Optional: horizontal scroll if really needed */
            max-height: 400px;           /* Optional: limit vertical height */
            overflow-y: auto;            /* Vertical scroll if too tall */
        }
    </style>
</head>
<body>
    <h1>Essay Checker</h1>
    <form id="essayForm">
        <label for="essay">Essay:</label><br>
        <textarea id="essay" name="essay" required></textarea><br>

        <label for="rubric">Rubric:</label><br>
        <textarea id="rubric" name="rubric" required>
Content & Relevance: 30
Organization & Structure: 20
Clarity & Cohesion: 15
Grammar & Mechanics: 15
Critical Thinking & Analysis: 20
        </textarea><br>

        <button type="submit">Check Essay</button>
    </form>

    <h3>Result:</h3>
    <pre id="result"></pre>

    <script>
        const form = document.getElementById('essayForm');
        const resultPre = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const response = await fetch('/check', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            resultPre.textContent = JSON.stringify(data, null, 2);
        });
    </script>
</body>
</html>
